name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint Check
        run: ./gradlew lintRelease --no-daemon

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-release.html

      - name: Decode keystore
        if: ${{ secrets.SIGNING_KEYSTORE != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > app/release-keystore.jks
        env:
          SIGNING_STORE_FILE: app/release-keystore.jks

      - name: Build Release APK (ARM64 only)
        run: ./gradlew assembleRelease --no-daemon
        env:
          SIGNING_STORE_FILE: ${{ secrets.SIGNING_KEYSTORE != '' && 'app/release-keystore.jks' || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOT-ARM64-release
          path: app/build/outputs/apk/release/*.apk
