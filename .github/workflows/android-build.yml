name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2

      - name: Generate fixed debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore $HOME/fixed-debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=GOT Debug,O=GoAI,C=CN"
          echo "SIGNING_STORE_FILE=$HOME/fixed-debug.keystore" >> $GITHUB_ENV
          echo "SIGNING_STORE_PASSWORD=android" >> $GITHUB_ENV
          echo "SIGNING_KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
          echo "SIGNING_KEY_PASSWORD=android" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log | tail -200
          echo "=== Build exit code: $? ==="

      - name: Show full build log on failure
        if: failure()
        run: cat build.log 2>/dev/null || echo "No build log found"

      - name: Run Lint
        run: |
          set -o pipefail
          gradle lintDebug --no-daemon 2>&1 | tee lint.log | tail -100
          echo "=== Lint exit code: $? ==="

      - name: Find APK files
        run: find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APK files found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GOT-debug-apk
          path: app/build/outputs/apk/debug/
          if-no-files-found: warn

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/
          if-no-files-found: ignore
