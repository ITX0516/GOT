
# KataGo GTP 配置 - 基于 BadukAI 原始配置

# Logging
logAllGTPCommunication = true
logSearchInfo = true
logToStderr = true

# Default rules
koRule = SIMPLE
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false
hasButton = false
whiteHandicapBonus = N

# Bot behavior
allowResignation = true
resignConsecTurns = 20

# Search limits
ponderingEnabled = false
lagBuffer = 1.0

# Play a little faster if the opponent is passing
searchFactorAfterOnePass = 0.50
searchFactorAfterTwoPass = 0.25
searchFactorWhenWinning = 0.40
searchFactorWhenWinningThreshold = 0.95

# NN settings
numNNServerThreadsPerModel = 1
nnMutexPoolSizePowerOfTwo = 16

# Search
rootSymmetryPruning = false
useGraphSearch = true
fpuParentWeightByVisitedPolicy = true

resignMinScoreDifference = 40
resignMinMovesPerBoardArea = 0.4
